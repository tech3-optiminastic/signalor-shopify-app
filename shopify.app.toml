# Signalor GEO — Shopify App Configuration

client_id = "8153badb6e71523e6844833ad6c23b18"
name = "Signalor GEO"
application_url = "https://app.signalor.ai"
embedded = false

[access_scopes]
scopes = "read_products,write_products,read_content,write_content,read_metaobjects,write_metaobjects,read_themes,write_themes,read_customers,read_orders"

[auth]
redirect_urls = [
  "https://app.signalor.ai/auth/callback",
  "http://localhost:8000/api/integrations/shopify/callback/",
  "http://localhost:3000/auth/callback"
]

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["products/create", "products/update", "products/delete"]
  uri = "/webhooks/products"

  [[webhooks.subscriptions]]
  topics = ["collections/create", "collections/update", "collections/delete"]
  uri = "/webhooks/collections"

  [webhooks.privacy_compliance]
  customer_deletion_url = "https://app.signalor.ai/webhooks"
  customer_data_request_url = "https://app.signalor.ai/webhooks"
  shop_deletion_url = "https://app.signalor.ai/webhooks"

[app_proxy]
subpath = "signalor"
prefix = "apps"
url = "https://app.signalor.ai/api"

[build]
automatically_update_urls_on_dev = true
